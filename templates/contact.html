{% extends "base.html" %}

{% block title %}
Contact | Ma Parvati Furnitures
{% endblock %}

{% block content %}

<!-- HERO -->
<section class="text-center py-24 px-6">

    <p class="text-yellow-500 uppercase tracking-[5px] mb-4">
        Contact Us
    </p>

    <h1 class="text-4xl md:text-7xl font-extrabold leading-tight">

        Let's Build Something
        <br>
        Beautiful Together

    </h1>

    <p class="mt-8 text-gray-400 text-lg md:text-2xl
    max-w-4xl mx-auto leading-relaxed">

        Have a furniture idea or custom carpentry project?
        Send us your inquiry and we’ll help bring your vision to life.

    </p>

</section>



<!-- CONTACT FORM -->
<section class="px-6 md:px-16 pb-28">

    <form
    method="POST"
    class="max-w-3xl mx-auto
    bg-[#181818]
    p-8 md:p-14
    rounded-3xl
    border border-white/10
    shadow-2xl">

        <!-- NAME -->
        <div class="mb-8">

            <label class="block text-lg mb-3 text-gray-300">
                Your Name
            </label>

            <input
            type="text"
            name="name"
            placeholder="Enter your full name"
            required
            class="w-full
            bg-black
            border border-white/10
            rounded-2xl
            px-5 py-4
            text-white
            focus:border-yellow-500
            transition duration-300">

        </div>



        <!-- PHONE -->
        <div class="mb-8">

            <label class="block text-lg mb-3 text-gray-300">
                Phone Number
            </label>

            <input
            type="text"
            name="phone"
            placeholder="Enter your phone number"
            required
            class="w-full
            bg-black
            border border-white/10
            rounded-2xl
            px-5 py-4
            text-white
            focus:border-yellow-500
            transition duration-300">

        </div>



        <!-- MESSAGE -->
        <div class="mb-8">

            <label class="block text-lg mb-3 text-gray-300">
                Your Requirement
            </label>

            <textarea
            name="message"
            rows="6"
            placeholder="Tell us about your furniture needs..."
            required
            class="w-full
            bg-black
            border border-white/10
            rounded-2xl
            px-5 py-4
            text-white
            resize-none
            focus:border-yellow-500
            transition duration-300"></textarea>

        </div>



        <!-- BUTTON -->
        <div class="text-center">

            <button
            type="submit"
            class="bg-yellow-500
            hover:bg-yellow-400
            text-black
            font-semibold
            px-10 py-4
            rounded-full
            text-lg
            transition duration-300
            hover:scale-105
            shadow-lg">

                Send Inquiry

            </button>

        </div>

    </form>

</section>

{% endblock %}
