<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:#0f0f0f;
            color:white;
            overflow-x:hidden;
        }

        input,
        textarea{
            outline:none;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="relative z-20">

        <!-- TOP BAR -->
        <div class="flex items-center justify-between
        mx-4 md:mx-12 mt-6
        px-6 py-5 rounded-2xl
        bg-white/10 backdrop-blur-md
        border border-white/20 text-white">

            <!-- LOGO -->
            <a href="/"
            class="text-2xl md:text-3xl font-bold
            hover:text-yellow-400 transition duration-300">

                Ma Parvati Furnitures

            </a>

            <!-- DESKTOP MENU -->
            <ul class="hidden md:flex gap-10 text-lg font-medium">

                <li>
                    <a href="/" class="hover:text-yellow-400 transition">
                        Home
                    </a>
                </li>

                <li>
                    <a href="/gallery" class="hover:text-yellow-400 transition">
                        Gallery
                    </a>
                </li>

                <li>
                    <a href="/services" class="hover:text-yellow-400 transition">
                        Services
                    </a>
                </li>

                <li>
                    <a href="/contact" class="hover:text-yellow-400 transition">
                        Contact
                    </a>
                </li>

            </ul>

            <!-- MOBILE BUTTON -->
            <button
            id="menu-btn"
            class="md:hidden text-3xl">

                ☰

            </button>

        </div>

        <!-- MOBILE MENU -->
        <div
        id="mobile-menu"
        class="hidden md:hidden
        mx-4 mt-4
        bg-black/90
        backdrop-blur-md
        border border-white/10
        rounded-2xl
        p-6 text-white">

            <ul class="flex flex-col gap-6 text-lg">

                <li>
                    <a href="/" class="hover:text-yellow-400 transition">
                        Home
                    </a>
                </li>

                <li>
                    <a href="/gallery" class="hover:text-yellow-400 transition">
                        Gallery
                    </a>
                </li>

                <li>
                    <a href="/services" class="hover:text-yellow-400 transition">
                        Services
                    </a>
                </li>

                <li>
                    <a href="/contact" class="hover:text-yellow-400 transition">
                        Contact
                    </a>
                </li>

            </ul>

        </div>

    </nav>


    <!-- PAGE CONTENT -->
    {% block content %}
    {% endblock %}


    <!-- MOBILE MENU SCRIPT -->
    <script>

        const menuBtn = document.getElementById("menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");

        menuBtn.addEventListener("click", () => {

            mobileMenu.classList.toggle("hidden");

        });

    </script>

</body>
</html>
