{% extends "base.html" %}

{% block title %}
Ma Parvati Furnitures
{% endblock %}

{% block content %}

<!-- HERO SECTION -->
<section
class="relative h-screen bg-cover bg-center mt-[-110px]"
style="background-image:url('{{ url_for('static', filename='images/hero.jpg') }}');">

    <!-- OVERLAY -->
    <div class="absolute inset-0 bg-black/55"></div>

    <!-- HERO CONTENT -->
    <div class="relative z-10 flex flex-col items-center justify-center
    text-center h-full px-6">

        <h1 class="text-4xl md:text-7xl font-extrabold
        leading-tight max-w-5xl">

            Custom Furniture Crafted
            <br>
            For Modern Living

        </h1>

        <p class="mt-8 text-gray-300 text-lg md:text-2xl
        max-w-3xl leading-relaxed">

            Premium carpentry and furniture solutions built
            with precision, elegance, and durability.

        </p>

        <div class="mt-10 flex flex-col sm:flex-row gap-5">

            <a href="/gallery"
            class="bg-yellow-500 hover:bg-yellow-400
            text-black font-semibold px-8 py-4
            rounded-full text-lg transition duration-300
            hover:scale-105">

                View Gallery

            </a>

            <a href="/contact"
            class="border border-white hover:bg-white
            hover:text-black text-white font-semibold
            px-8 py-4 rounded-full text-lg
            transition duration-300 hover:scale-105">

                Contact Us

            </a>

        </div>

    </div>

</section>

{% endblock %}
