<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Sanwar Furniture</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins', sans-serif;
            background:#0f0f0f;
            color:white;
        }

    </style>

</head>

<body class="flex items-center justify-center min-h-screen px-6">

    <!-- LOGIN BOX -->
    <div class="w-full max-w-md bg-[#181818]
    p-10 rounded-3xl border border-white/10">

        <div class="text-center mb-10">

            <h1 class="text-4xl font-bold mb-4">
                Admin Login
            </h1>

            <p class="text-gray-400">
                Sanwar Furniture Dashboard
            </p>

        </div>

        <form method="POST">

            <!-- USERNAME -->
            <div class="mb-6">

                <label class="block mb-3 text-gray-300">
                    Username
                </label>

                <input
                type="text"
                name="username"
                required
                class="w-full bg-black border border-white/10
                rounded-2xl px-5 py-4 text-white">

            </div>

            <!-- PASSWORD -->
            <div class="mb-8">

                <label class="block mb-3 text-gray-300">
                    Password
                </label>

                <input
                type="password"
                name="password"
                required
                class="w-full bg-black border border-white/10
                rounded-2xl px-5 py-4 text-white">

            </div>

            <!-- BUTTON -->
            <button
            type="submit"
            class="w-full bg-yellow-500 hover:bg-yellow-400
            text-black font-semibold py-4 rounded-2xl
            transition duration-300">

                Login

            </button>

        </form>

    </div>

</body>
</html>
