<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Sanwar Furniture</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins', sans-serif;
            background:black;
            color:white;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="flex items-center justify-between
    mx-6 md:mx-12 mt-6
    px-8 py-5 rounded-2xl
    bg-white/10 backdrop-blur-md
    border border-white/20 text-white">

        <a href="/"
        class="text-2xl md:text-3xl font-bold hover:text-yellow-400 transition duration-300">

            Sanwar Furniture

        </a>

        <ul class="hidden md:flex gap-10 text-lg font-medium">

            <li><a href="/" class="hover:text-yellow-400 transition">Home</a></li>

            <li><a href="/gallery" class="text-yellow-400">Gallery</a></li>

            <li><a href="/services" class="hover:text-yellow-400 transition">Services</a></li>

            <li><a href="/contact" class="hover:text-yellow-400 transition">Contact</a></li>

        </ul>

    </nav>

    <!-- TITLE -->
    <section class="py-24 px-6 md:px-16 text-center">

        <p class="text-yellow-500 uppercase tracking-[4px] mb-4">
            Our Work
        </p>

        <h2 class="text-5xl md:text-7xl font-bold">
            Furniture Gallery
        </h2>

    </section>

    <!-- GALLERY -->
    <section class="px-6 md:px-16 pb-24">

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

            <div class="overflow-hidden rounded-3xl group">
                <img src="{{ url_for('static', filename='images/1.jpg') }}"
                class="w-full h-[400px] object-cover group-hover:scale-110 transition duration-700">
            </div>

            <div class="overflow-hidden rounded-3xl group">
                <img src="{{ url_for('static', filename='images/2.jpg') }}"
                class="w-full h-[400px] object-cover group-hover:scale-110 transition duration-700">
            </div>

            <div class="overflow-hidden rounded-3xl group">
                <img src="{{ url_for('static', filename='images/3.jpg') }}"
                class="w-full h-[400px] object-cover group-hover:scale-110 transition duration-700">
            </div>

            <div class="overflow-hidden rounded-3xl group">
                <img src="{{ url_for('static', filename='images/4.jpg') }}"
                class="w-full h-[400px] object-cover group-hover:scale-110 transition duration-700">
            </div>

            <div class="overflow-hidden rounded-3xl group">
                <img src="{{ url_for('static', filename='images/5.jpg') }}"
                class="w-full h-[400px] object-cover group-hover:scale-110 transition duration-700">
            </div>

            <div class="overflow-hidden rounded-3xl group">
                <img src="{{ url_for('static', filename='images/6.jpg') }}"
                class="w-full h-[400px] object-cover group-hover:scale-110 transition duration-700">
            </div>

        </div>

    </section>

</body>
</html>
