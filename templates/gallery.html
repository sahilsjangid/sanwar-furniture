{% extends "base.html" %}

{% block title %}
Gallery | Ma Parvati Furnitures
{% endblock %}

{% block content %}

<section class="py-24 px-6 md:px-16">

    <div class="text-center mb-20">

        <p class="text-yellow-500 uppercase tracking-[4px] mb-4">
            Our Work
        </p>

        <h1 class="text-4xl md:text-7xl font-bold">
            Furniture Gallery
        </h1>

    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

        {% for i in range(1,7) %}

        <div class="overflow-hidden rounded-3xl group">

            <img
            src="{{ url_for('static', filename='images/' ~ i ~ '.jpg') }}"
            class="w-full h-[300px] md:h-[400px]
            object-cover group-hover:scale-110
            transition duration-700">

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
