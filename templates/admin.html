<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Sanwar Furniture</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins', sans-serif;
            background:#0f0f0f;
            color:white;
        }

    </style>

</head>

<body class="px-6 md:px-16 py-10">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row
    items-center justify-between mb-12 gap-6">

        <div>

            <p class="text-yellow-500 uppercase tracking-[4px] mb-3">
                Dashboard
            </p>

            <h1 class="text-4xl md:text-6xl font-bold">
                Customer Inquiries
            </h1>

        </div>

        <!-- BUTTONS -->
        <div class="flex gap-4">

            <!-- EXPORT -->
            <a href="/export"
            class="bg-yellow-500 hover:bg-yellow-400
            text-black px-6 py-3 rounded-2xl
            font-semibold transition duration-300">

                Export Excel

            </a>

            <!-- LOGOUT -->
            <a href="/logout"
            class="border border-white/20
            hover:bg-white hover:text-black
            px-6 py-3 rounded-2xl
            font-semibold transition duration-300">

                Logout

            </a>

        </div>

    </div>



    <!-- TABLE -->
    <div class="overflow-x-auto bg-[#181818]
    rounded-3xl border border-white/10">

        <table class="w-full">

            <!-- TABLE HEAD -->
            <thead class="bg-black/40">

                <tr>

                    <th class="text-left p-6 text-lg">
                        ID
                    </th>

                    <th class="text-left p-6 text-lg">
                        Name
                    </th>

                    <th class="text-left p-6 text-lg">
                        Phone
                    </th>

                    <th class="text-left p-6 text-lg">
                        Message
                    </th>

                    <th class="text-left p-6 text-lg">
                        Action
                    </th>

                </tr>

            </thead>

            <!-- TABLE BODY -->
            <tbody>

                {% for inquiry in inquiries %}

                <tr class="border-t border-white/10">

                    <td class="p-6">
                        {{ inquiry[0] }}
                    </td>

                    <td class="p-6">
                        {{ inquiry[1] }}
                    </td>

                    <td class="p-6">
                        {{ inquiry[2] }}
                    </td>

                    <td class="p-6 max-w-md">
                        {{ inquiry[3] }}
                    </td>

                    <td class="p-6">

                        <a href="/delete/{{ inquiry[0] }}"
                        class="bg-red-500 hover:bg-red-400
                        px-4 py-2 rounded-xl
                        text-white transition duration-300">

                            Delete

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>
</html>
